name: Nightly PR develop → main

on:
  schedule:
    - cron: '0 15 * * *'  # 10 PM GMT+7 every day
  workflow_dispatch:        # allow manual trigger from Actions UI

jobs:
  open-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Open PR if none exists and develop is ahead of main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin main develop
          ahead=$(git rev-list --count origin/main..origin/develop)
          if [ "$ahead" -eq 0 ]; then
            echo "develop is up-to-date with main — skipping."
            exit 0
          fi

          existing=$(gh pr list --base main --head develop --state open --json number --jq length)
          if [ "$existing" -gt 0 ]; then
            echo "PR already open — skipping."
          else
            gh pr create \
              --base main \
              --head develop \
              --title "chore: nightly sync develop → main ($(date -u '+%Y-%m-%d'))" \
              --body "Automated nightly PR to keep main up to date with develop."
          fi
