name: Triage new issues with Claude

on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - name: Cache Claude Code
        id: claude-cache
        uses: actions/cache@v5
        with:
          path: ~/.local
          key: claude-code-${{ runner.os }}-v1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          path_to_claude_code_executable: ${{ steps.claude-cache.outputs.cache-hit == 'true' && '/home/runner/.local/bin/claude' || '' }}
          claude_args: "--allowedTools 'Bash(gh issue comment:*),Bash(gh issue view:*)'"
          prompt: |
            You are triaging a new GitHub issue for the SavingForBonding app — a FIFA World Cup football prediction game built with Next.js 15, tRPC, Prisma, and Tailwind CSS v4.

            Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            Body:
            ${{ github.event.issue.body }}

            Opened by: ${{ github.event.issue.user.login }}

            Write a friendly, plain-language comment — written for the person who filed the issue, not a developer. Do not mention code, file paths, technical terms, or implementation details.

            The comment should include:

            1. **Understanding**: Restate the request in 1–2 sentences to confirm you've understood what they want.
            2. **Questions** (omit if the request is already fully clear): Ask only what you need to know about the *desired outcome* — what it should look like, how it should behave, what problem it solves. Do not ask about how it would be built.

            Assess the complexity privately (do not include this in the comment):
            - **trivial** — a small, focused change: swap an image, change a label, adjust a colour, toggle a minor behaviour
            - **simple** — affects several parts of the app or involves a new section/screen
            - **complex** — a significant new feature, changes to core game rules (voting, scoring, leaderboard), or requires design decisions before work can begin

            If complexity is **trivial** AND there are no outstanding questions, append this exact line at the end of your comment:
            Reply @claude go ahead to auto-implement

            Once you have written the comment, post it by running:
            gh issue comment ${{ github.event.issue.number }} --body '<your comment here>'
